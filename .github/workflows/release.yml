name: Release

# Manually triggered from the Actions UI. Reads the version straight
# from Cargo.toml (the single source of truth), creates a matching git
# tag if one doesn't already exist, builds a Windows release binary, and
# publishes it as a GitHub Release.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Read version from Cargo.toml
        id: version
        shell: pwsh
        run: |
          $version = (cargo metadata --no-deps --format-version 1 | ConvertFrom-Json).packages[0].version
          $tag = "v$version"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Check tag does not already exist
        shell: pwsh
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          $exists = git ls-remote --tags origin $env:TAG
          if ($exists) {
            Write-Error "Tag '$env:TAG' already exists. Bump the version in Cargo.toml before releasing again."
            exit 1
          }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88
        with:
          toolchain: stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package binary
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          $zipName = "aws-util-$env:VERSION-windows-x86_64.zip"
          Compress-Archive -Path target/release/aws-util.exe -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Create and push tag
        shell: pwsh
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $env:TAG
          git push origin $env:TAG

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: ${{ env.ZIP_NAME }}
          generate_release_notes: true
          draft: true
